<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CustomArt - Tilaa taidetta</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .art-box { background: white; padding: 25px; border-radius: 12px; max-width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); box-sizing: border-box; }
        select, input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <!-- TÄSSÄ ON SE KAIVATTU DIV-RAKENNE -->
    <div class="art-box">
        <h2>CustomArt</h2>
        <p>Tilaa uniikkia, kustomoitua taidetta suoraan artistilta.</p>
        
        <label>Valitse taulun koko:</label>
        <select id="artSize">
            <option value="A4">A4 Koko (50€)</option>
            <option value="A3">A3 Koko (80€)</option>
            <option value="A2">A2 Koko (120€)</option>
        </select>

        <label>Kuvaile toiveesi:</label>
        <input type="text" id="artDetails" placeholder="Esim. Kissa kuunvalossa...">

        <button onclick="lahetaTilaus()">Siirry maksamaan</button>
    </div>

    <!-- Tämä yhdistää div-napin siihen sinun fetch-koodiin -->
    <script src="app.js"></script>
</body>
</html>
